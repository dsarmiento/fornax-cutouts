# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  title: Fornax Cutouts User Documentation
  subject: Fornax Cutouts User Documentation
  description: Pluggable backend for async FITS image cutouts with FastAPI + Celery using the IVOA UWS standard
  github: https://github.com/nasa-fornax/fornax-cutouts
  license:
    id: BSD-3-Clause
    url: https://github.com/nasa-fornax/fornax-cutouts/blob/main/LICENSE
  keywords:
    - astronomy
    - FITS
    - cutouts
    - FastAPI
    - Celery
    - UWS
    - IVOA
  error_rules:
    - rule: link-resolves
      severity: warn
extends:
  - toc.yml

site:
  template: book-theme
  options:
    favicon: docs/_static/fornax_favicon.ico
    logo: docs/_static/fornax_logo.png
