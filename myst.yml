# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  title: NASA Fornax Cutouts
  subject: NASA Fornax Cutouts Documentation
  description: Pluggable backend for async FITS image cutouts with FastAPI + Celery using the IVOA UWS standard
  github: https://github.com/nasa-fornax/fornax-cutouts
  license:
    id: BSD-3-Clause
    url: https://github.com/nasa-fornax/fornax-cutouts/blob/main/LICENSE
  keywords:
    - astronomy
    - FITS
    - cutouts
    - FastAPI
    - Celery
    - UWS
    - IVOA
  error_rules:
    - rule: link-resolves
      severity: warn
extends:
  - toc.yml

site:
  template: book-theme
  options:
    logo: docs/assets/imgs/fornax-logo.png
    logo_text: NASA Fornax - Cutouts
