# Build and deploy MyST docs to GitHub Pages from the main branch only.
#
# Setup (once): Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: gh-pages, folder: / (root)
name: Deploy documentation to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "myst.yml"
      - "toc.yml"
      - ".github/workflows/github-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install mystmd
        run: npm install -g mystmd

      - name: Build static HTML
        run: myst build --html --ci

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: _build/html
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-html
          path: _build/html

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _build/html
          branch: gh-pages
          clean: true
